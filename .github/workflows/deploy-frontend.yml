name: Deploy Frontend

on:
  push:
    branches:
      - main
    paths:
      - 'version.txt'

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ml-frontend

    steps:
      - name: Clonar repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: ml-frontend/package-lock.json

      - name: Instalar dependencias
        run: npm install

      - name: Build React
        run: npm run build

      - name: Parchear URLs de Localhost a Producción (/api)
        # Usamos "set +e" para que si grep no encuentra nada, el script no se detenga
        run: |
          set +e
          grep -ril "http://localhost:8000" build/ | xargs -r sed -i 's|http://localhost:8000||g'
          echo "Parcheo completado o saltado porque no hay coincidencias."

      - name: Deploy con rsync
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_USER: ${{ secrets.SSH_USER }}
        run: |
          # 1. Validar que los secrets no estén vacíos (para depurar)
          if [ -z "$SSH_HOST" ]; then echo "ERROR: SSH_HOST está vacío"; exit 1; fi
          
          # 2. Configurar la llave SSH
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          
          # 3. Sincronizar (Usamos flags que ignoran la verificación de host para evitar que ssh-keyscan falle)
          rsync -avz --delete \
          -e "ssh -i ~/.ssh/id_rsa -o StrictHostKeyChecking=no -o ConnectTimeout=10" \
          build/ \
          $SSH_USER@$SSH_HOST:/var/www/html/ml-frontend/build/